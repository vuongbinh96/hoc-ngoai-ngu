<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoPro 2026 | Enterprise Language Learning Core</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.6.0/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* CSS ARCHITECTURE - LINE 20-200 */
        :root {
            --primary: #2563eb; --primary-light: #dbeafe;
            --secondary: #0ea5e9; --accent: #f59e0b;
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(37, 99, 235, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: #1e293b;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.05) 0%, transparent 50%);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
        }

        .lyric-row {
            padding: 12px 20px;
            margin-bottom: 10px;
            border-radius: 16px;
            display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .lyric-row:hover {
            background: white;
            border-color: var(--primary-light);
            transform: translateX(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .quiz-input {
            background: white;
            border: 2px solid #e2e8f0;
            color: var(--primary);
            text-align: center; font-weight: 800; outline: none;
            border-radius: 8px; padding: 4px 8px; transition: 0.3s;
        }

        .quiz-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }
        .quiz-input.correct { background: #10b981 !important; border-color: #059669; color: white; animation: success-pop 0.5s; }

        @keyframes success-pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        .hint-btn { color: var(--accent); cursor: pointer; transition: 0.3s; font-size: 14px; }
        .hint-btn:hover { transform: scale(1.2) rotate(10deg); filter: drop-shadow(0 0 5px var(--accent)); }

        .badge { font-size: 9px; padding: 3px 8px; border-radius: 20px; background: var(--primary-light); color: var(--primary); font-weight: 800; }
        
        .word-clickable { cursor: pointer; border-radius: 6px; padding: 2px 4px; transition: 0.2s; position: relative; }
        .word-clickable:hover { background: var(--primary-light); color: var(--primary); }

        .scrollbar-hide::-webkit-scrollbar { width: 5px; }
        .scrollbar-hide::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        #timer-ui {
            position: fixed; top: 100px; right: 40px;
            padding: 20px 30px; display: none; z-index: 100;
        }

        .enterprise-btn {
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: white; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
            transition: 0.3s;
        }
        .enterprise-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.5); }
        .enterprise-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
    </style>
</head>
<body class="flex flex-col">

    <nav class="h-24 px-12 glass-card !rounded-none border-x-0 border-t-0 flex items-center justify-between z-[1000]">
        <div class="flex items-center gap-5">
            <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-500/30">
                <i class="fa-solid fa-graduation-cap text-white text-2xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-slate-800 leading-none">LINGO<span class="text-blue-600">PRO</span></h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-[0.4em] uppercase">Titan Enterprise Core v6.0</p>
            </div>
        </div>

        <div class="flex items-center gap-10">
            <div class="text-right">
                <p class="text-[10px] text-slate-400 font-bold uppercase">System Status</p>
                <p class="text-sm font-black text-emerald-500 flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> ONLINE
                </p>
            </div>
            <div class="h-10 w-[1px] bg-slate-200"></div>
            <div id="stat-vault" class="text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase">Vocabulary Vault</p>
                <p class="text-lg font-black text-blue-600">0 / 10 WORDS</p>
            </div>
            <button id="quiz-init-btn" onclick="triggerQuizMode()" disabled class="enterprise-btn px-10 py-4 rounded-2xl font-black text-sm uppercase tracking-wider">
                <i class="fa-solid fa-lock mr-2"></i> Lock Mission
            </button>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden p-8 gap-8">
        
        <aside class="w-[480px] space-y-8 flex flex-col h-full">
            <div class="glass-card p-8 space-y-6 flex-shrink-0">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest">Neural Input</h3>
                    <button onclick="clearSystem()" class="text-[10px] font-bold text-red-400 hover:text-red-600 transition">PURGE DATA</button>
                </div>
                <textarea id="neural-input" class="w-full h-64 bg-slate-50 border-2 border-slate-100 p-6 rounded-3xl outline-none focus:border-blue-500 transition shadow-inner text-sm leading-relaxed" placeholder="Dán lời bài hát hoặc đoạn văn tiếng Anh vào đây..."></textarea>
                <button onclick="initializeSystem()" class="w-full enterprise-btn py-5 rounded-3xl font-black uppercase tracking-widest text-sm">Deploy Engine</button>
            </div>

            <div class="glass-card p-8 flex-1 overflow-hidden flex flex-col">
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4">Live Analytics</h3>
                <div id="log-terminal" class="flex-1 overflow-y-auto scrollbar-hide space-y-3 font-mono text-[11px]">
                    <div class="text-blue-500">[SYSTEM] Awaiting neural injection...</div>
                </div>
            </div>
        </aside>

        <section class="flex-1 glass-card p-12 overflow-y-auto scrollbar-hide relative group">
            <div id="main-stage" class="max-w-4xl mx-auto">
                <div class="h-full flex flex-col items-center justify-center py-40 text-slate-300 pointer-events-none">
                    <i class="fa-solid fa-microchip text-[120px] mb-10 opacity-20"></i>
                    <h2 class="text-4xl font-black uppercase tracking-tighter opacity-20">Ready for Mission</h2>
                </div>
            </div>

            <div id="timer-ui" class="glass-card border-2 border-red-500/20 shadow-2xl shadow-red-500/10">
                <p class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">Time Remaining</p>
                <p id="timer-val" class="text-4xl font-black text-slate-800 tracking-tighter">15:00</p>
            </div>
        </section>
    </main>

    <script>
        /**
         * LINGOPRO TITAN ENTERPRISE CORE v6.0.0
         * "Because 301 lines just isn't enough for Captain."
         */

        const SYSTEM = {
            vault: JSON.parse(localStorage.getItem('titan_vocab')) || [],
            isActive: false,
            timer: null,
            grammarMap: ['NOUN', 'VERB', 'ADJ', 'ADV', 'CONJ', 'PREP'],
            sessionLogs: [],
            achievements: [
                { id: 'first_word', title: 'First Contact', icon: '🚀', goal: 1 },
                { id: 'quiz_ready', title: 'Master of Ten', icon: '🏆', goal: 10 },
                { id: 'speed_learner', title: 'Sonic Pulse', icon: '⚡', goal: 20 }
            ]
        };

        // 1. LOGGER MODULE
        function writeLog(msg, type = 'system') {
            const terminal = document.getElementById('log-terminal');
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = type === 'success' ? 'text-emerald-500' : 'text-slate-500';
            logEntry.innerHTML = `<span class="opacity-50">[${time}]</span> <span class="font-bold">${type.toUpperCase()}:</span> ${msg}`;
            terminal.prepend(logEntry);
            SYSTEM.sessionLogs.push({time, msg, type});
        }

        // 2. UI SYNC MODULE
        function syncUI() {
            const count = SYSTEM.vault.length;
            const btn = document.getElementById('quiz-init-btn');
            document.querySelector('#stat-vault p:last-child').innerText = `${count} / 10 WORDS`;
            
            if (count >= 10) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-play mr-2"></i> START MISSION';
                writeLog("Gatekeeper unlocked. Quiz mode available.", "success");
            } else {
                btn.disabled = true;
                btn.innerHTML = `<i class="fa-solid fa-lock mr-2"></i> NEED ${10 - count} WORDS`;
            }
            checkAchievements();
        }

        // 3. ENGINE MODULE (THE 1/10 QUIZ LOGIC)
        function initializeSystem() {
            const text = document.getElementById('neural-input').value.trim();
            if (!text) return writeLog("Critical Error: No input data.", "error");

            writeLog("Initializing Neural Mapping Engine...", "system");
            const stage = document.getElementById('main-stage');
            stage.innerHTML = "";

            text.split('\n').forEach(line => {
                if (!line.trim()) return;
                const row = document.createElement('div');
                row.className = 'lyric-row';
                
                line.split(/\s+/).forEach(word => {
                    const clean = word.replace(/[.,!?;:'"“”()]/g, "");
                    
                    // Logic: 1/10 xác suất đục lỗ
                    if (Math.random() < 0.1 && clean.length > 2) {
                        const wrap = document.createElement('div');
                        wrap.className = 'inline-flex items-center gap-2 mx-1';

                        const inp = document.createElement('input');
                        inp.className = 'quiz-input';
                        inp.style.width = (clean.length + 1) + 'ch';
                        inp.placeholder = '...';

                        const hint = document.createElement('i');
                        hint.className = 'fa-solid fa-bolt-lightning hint-btn';
                        hint.onclick = () => {
                            inp.placeholder = clean[0].toUpperCase() + "_".repeat(clean.length - 1);
                            writeLog(`Hint deployed for token: ${clean}`);
                        };

                        inp.oninput = (e) => {
                            if (e.target.value.toLowerCase() === clean.toLowerCase()) {
                                inp.classList.add('correct');
                                inp.disabled = true;
                                hint.remove();
                                addToVault(clean);
                                triggerCelebration();
                            }
                        };
                        wrap.append(inp, hint);
                        row.appendChild(wrap);
                    } else {
                        const span = document.createElement('span');
                        span.className = 'word-clickable';
                        span.innerText = word + " ";
                        span.onclick = () => performNeuralTranslation(line);
                        row.appendChild(span);
                    }
                });
                stage.appendChild(row);
            });
            gsap.from('.lyric-row', { opacity: 0, x: -30, stagger: 0.04, duration: 0.6, ease: "power2.out" });
            syncUI();
        }

        // 4. STORAGE & TRANSLATION
        function addToVault(word) {
            if (!SYSTEM.vault.includes(word.toLowerCase())) {
                SYSTEM.vault.push(word.toLowerCase());
                localStorage.setItem('titan_vocab', JSON.stringify(SYSTEM.vault));
                writeLog(`Token saved to vault: ${word.toUpperCase()}`, "success");
                syncUI();
            }
        }

        async function performNeuralTranslation(text) {
            writeLog(`Analyzing cluster: "${text.substring(0, 20)}..."`);
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=vi&dt=t&q=${encodeURIComponent(text)}`);
                const data = await res.json();
                alert(`[NEURAL TRANSLATION]\n\nOriginal: ${text}\n\nTranslated: ${data[0][0][0]}`);
            } catch (e) { writeLog("Translation engine fault.", "error"); }
        }

        // 5. QUIZ & ACHIEVEMENTS
        function triggerQuizMode() {
            writeLog("FINAL MISSION ACTIVATED. 15:00 on the clock.", "system");
            let time = 900;
            const ui = document.getElementById('timer-ui');
            const display = document.getElementById('timer-val');
            ui.style.display = 'block';

            SYSTEM.timer = setInterval(() => {
                time--;
                const m = Math.floor(time / 60);
                const s = time % 60;
                display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (time <= 0) {
                    clearInterval(SYSTEM.timer);
                    alert("MISSION FAILURE: TIME EXPIRED.");
                    location.reload();
                }
            }, 1000);
        }

        function checkAchievements() {
            SYSTEM.achievements.forEach(ach => {
                if (SYSTEM.vault.length >= ach.goal) {
                    // Logic hiển thị huy hiệu hoặc thông báo ở đây
                }
            });
        }

        function triggerCelebration() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#2563eb', '#0ea5e9', '#f59e0b'] });
        }

        function clearSystem() {
            if(confirm("Xác nhận xóa toàn bộ dữ liệu hệ thống?")) {
                localStorage.removeItem('titan_vocab');
                location.reload();
            }
        }

        // INIT
        writeLog("Core system version 6.0.0 stabilized.");
        syncUI();
    </script>
</body>
</html>
